<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1420"/>
    </linearGradient>

    <!-- Key glow -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Node gradient -->
    <radialGradient id="node-grad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#1de9c4;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0a8f74;stop-opacity:0.05"/>
    </radialGradient>

    <!-- Line gradients: fade in from left -->
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1de9c4;stop-opacity:0"/>
      <stop offset="70%" style="stop-color:#1de9c4;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1de9c4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="line2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b9cf6;stop-opacity:0"/>
      <stop offset="70%" style="stop-color:#5b9cf6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#5b9cf6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="line3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1de9c4;stop-opacity:0"/>
      <stop offset="70%" style="stop-color:#1de9c4;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#1de9c4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="line4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0"/>
      <stop offset="70%" style="stop-color:#a78bfa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="line5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1de9c4;stop-opacity:0"/>
      <stop offset="70%" style="stop-color:#1de9c4;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1de9c4;stop-opacity:0"/>
    </linearGradient>

    <!-- Dot glow -->
    <radialGradient id="dot-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1de9c4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1de9c4;stop-opacity:0"/>
    </radialGradient>

    <!-- DB body gradient -->
    <linearGradient id="db-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#112d2a"/>
      <stop offset="100%" style="stop-color:#0c1f1d"/>
    </linearGradient>

    <!-- DB top ellipse gradient -->
    <radialGradient id="db-top" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#25f5c8"/>
      <stop offset="100%" style="stop-color:#0d9e7e"/>
    </radialGradient>

    <!-- Output line -->
    <linearGradient id="out-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1de9c4;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#1de9c4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1de9c4;stop-opacity:0.3"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1de9c4" stroke-width="0.15" opacity="0.2"/>
    </pattern>

    <!-- Clip path for background -->
    <clipPath id="bg-clip">
      <rect width="800" height="340" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" rx="16" fill="url(#bg)"/>
  <rect width="800" height="340" rx="16" fill="url(#grid)" clip-path="url(#bg-clip)"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" style="stop-color:#000000;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#000000;stop-opacity:0.5"/>
  </radialGradient>
  <rect width="800" height="340" rx="16" fill="url(#vignette)"/>

  <!-- ═══ LEFT KEYS (input labels) ═══ -->
  <!-- Key labels — left column -->
  <!-- Key 1: 8.8.8.8 -->
  <g filter="url(#glow-cyan)">
    <rect x="42" y="52" width="118" height="26" rx="5" fill="#0d1f1e" stroke="#1de9c4" stroke-width="1" opacity="0.85"/>
    <text x="101" y="70" font-family="'Courier New', monospace" font-size="11.5" fill="#1de9c4" text-anchor="middle" opacity="0.95">8.8.8.8</text>
  </g>
  <!-- Key 2: 8.8.4.4 -->
  <g filter="url(#glow-cyan)">
    <rect x="42" y="100" width="118" height="26" rx="5" fill="#0d1f1e" stroke="#5b9cf6" stroke-width="1" opacity="0.85"/>
    <text x="101" y="118" font-family="'Courier New', monospace" font-size="11.5" fill="#5b9cf6" text-anchor="middle" opacity="0.95">8.8.4.4</text>
  </g>
  <!-- Key 3: gmail.com -->
  <g filter="url(#glow-cyan)">
    <rect x="42" y="148" width="118" height="26" rx="5" fill="#0d1f1e" stroke="#1de9c4" stroke-width="1" opacity="0.85"/>
    <text x="101" y="166" font-family="'Courier New', monospace" font-size="11.5" fill="#1de9c4" text-anchor="middle" opacity="0.9">gmail.com</text>
  </g>
  <!-- Key 4: user@co.io -->
  <g filter="url(#glow-cyan)">
    <rect x="42" y="196" width="118" height="26" rx="5" fill="#0d1f1e" stroke="#a78bfa" stroke-width="1" opacity="0.85"/>
    <text x="101" y="214" font-family="'Courier New', monospace" font-size="11.5" fill="#a78bfa" text-anchor="middle" opacity="0.95">user@co.io</text>
  </g>
  <!-- Key 5: 8.8.0.0/16 -->
  <g filter="url(#glow-cyan)">
    <rect x="42" y="244" width="118" height="26" rx="5" fill="#0d1f1e" stroke="#1de9c4" stroke-width="1" opacity="0.7"/>
    <text x="101" y="262" font-family="'Courier New', monospace" font-size="11.5" fill="#1de9c4" text-anchor="middle" opacity="0.8">8.8.0.0/16</text>
  </g>

  <!-- ═══ CONVERGING LINES ═══ -->
  <!-- Each line: from right edge of key → convergence point (cx=430, cy=170) -->
  <!-- Line 1 from key1 (y=65) -->
  <path d="M 160 65 Q 295 65 430 170" fill="none" stroke="url(#line1)" stroke-width="1.5" opacity="0.7"/>
  <!-- Line 2 from key2 (y=113) -->
  <path d="M 160 113 Q 295 113 430 170" fill="none" stroke="url(#line2)" stroke-width="1.5" opacity="0.7"/>
  <!-- Line 3 from key3 (y=161) -->
  <path d="M 160 161 L 430 170" fill="none" stroke="url(#line3)" stroke-width="1.8" opacity="0.8"/>
  <!-- Line 4 from key4 (y=209) -->
  <path d="M 160 209 Q 295 209 430 170" fill="none" stroke="url(#line4)" stroke-width="1.5" opacity="0.7"/>
  <!-- Line 5 from key5 (y=257) -->
  <path d="M 160 257 Q 295 257 430 170" fill="none" stroke="url(#line5)" stroke-width="1.5" opacity="0.6"/>

  <!-- Convergence glow halo -->
  <circle cx="430" cy="170" r="38" fill="url(#node-grad)" opacity="0.6"/>
  <circle cx="430" cy="170" r="22" fill="url(#dot-glow)" opacity="0.12"/>

  <!-- ═══ DATABASE CYLINDER ═══ -->
  <!-- Shadow -->
  <ellipse cx="432" cy="230" rx="46" ry="10" fill="#000" opacity="0.35"/>

  <!-- Cylinder body -->
  <rect x="387" y="140" width="90" height="82" rx="2" fill="url(#db-body)" stroke="#1de9c4" stroke-width="1.2" opacity="0.9"/>

  <!-- Cylinder stripes (disk layers) -->
  <line x1="387" y1="160" x2="477" y2="160" stroke="#1de9c4" stroke-width="0.6" opacity="0.25"/>
  <line x1="387" y1="180" x2="477" y2="180" stroke="#1de9c4" stroke-width="0.6" opacity="0.25"/>
  <line x1="387" y1="200" x2="477" y2="200" stroke="#1de9c4" stroke-width="0.6" opacity="0.2"/>

  <!-- Cylinder bottom ellipse -->
  <ellipse cx="432" cy="222" rx="45" ry="11" fill="#0c1f1d" stroke="#1de9c4" stroke-width="1.2" opacity="0.7"/>

  <!-- Cylinder top ellipse (glowing) -->
  <ellipse cx="432" cy="140" rx="45" ry="13" fill="url(#db-top)" opacity="0.9" filter="url(#glow-cyan)"/>
  <ellipse cx="432" cy="140" rx="45" ry="13" fill="none" stroke="#25f5c8" stroke-width="1.5"/>

  <!-- Inner highlight on top ellipse -->
  <ellipse cx="432" cy="138" rx="28" ry="7" fill="#25f5c8" opacity="0.08"/>

  <!-- ═══ OUTPUT LINE (right side) ═══ -->
  <line x1="477" y1="170" x2="620" y2="170" stroke="url(#out-line)" stroke-width="2.2"/>
  <!-- Arrow head -->
  <polygon points="616,163 630,170 616,177" fill="#1de9c4" opacity="0.9" filter="url(#glow-cyan)"/>

  <!-- Output object label -->
  <g filter="url(#glow-cyan)">
    <rect x="630" y="130" width="130" height="82" rx="8" fill="#0d1f1e" stroke="#1de9c4" stroke-width="1.2" opacity="0.9"/>
    <text x="695" y="153" font-family="'Courier New', monospace" font-size="10" fill="#1de9c4" text-anchor="middle" opacity="0.6">// one object</text>
    <text x="695" y="171" font-family="'Courier New', monospace" font-size="10.5" fill="#25f5c8" text-anchor="middle" opacity="0.95">org: Google</text>
    <text x="695" y="188" font-family="'Courier New', monospace" font-size="10.5" fill="#5b9cf6" text-anchor="middle" opacity="0.9">asn: 15169</text>
    <text x="695" y="205" font-family="'Courier New', monospace" font-size="10.5" fill="#a78bfa" text-anchor="middle" opacity="0.85">cc:  US</text>
  </g>

  <!-- ═══ BRANDING ═══ -->
  <!-- FuseDB wordmark -->
  <text x="400" y="308"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="38"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="2"
    filter="url(#glow-text)"
    opacity="0.97">Fuse<tspan fill="#1de9c4">DB</tspan></text>

  <!-- Tagline -->
  <text x="400" y="330"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#4a7a72"
    text-anchor="middle"
    letter-spacing="3">MANY KEYS · ONE OBJECT · ZERO DUPLICATION</text>

  <!-- .fsdb badge -->
  <rect x="722" y="14" width="62" height="22" rx="4" fill="#112d2a" stroke="#1de9c4" stroke-width="0.8" opacity="0.8"/>
  <text x="753" y="29" font-family="'Courier New', monospace" font-size="10.5" fill="#1de9c4" text-anchor="middle" opacity="0.9">.fsdb</text>

  <!-- Version badge -->
  <rect x="16" y="14" width="46" height="22" rx="4" fill="#1a1030" stroke="#a78bfa" stroke-width="0.8" opacity="0.8"/>
  <text x="39" y="29" font-family="'Courier New', monospace" font-size="10.5" fill="#a78bfa" text-anchor="middle" opacity="0.9">v0.2.0</text>
</svg>
