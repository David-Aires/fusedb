name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  # ── 1. Rust checks ────────────────────────────────────────────────────────────
  rust-check:
    name: Rust — fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (≥1.83 for pyo3 0.28)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test (unit)
        run: cargo test --lib

  # ── 2. Python × OS × version matrix ─────────────────────────────────────────
  python-test:
    name: Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Build extension + install dev deps
        run: |
          uv venv --python ${{ matrix.python }}
          uv pip install maturin
          uv run maturin develop --release
          uv pip install ".[dev]"

      - name: ruff lint
        run: uv run ruff check python/ tests/

      - name: ruff format check
        run: uv run ruff format --check python/ tests/

      - name: mypy
        run: uv run mypy python/fusedb/
        continue-on-error: true

      - name: pytest + coverage
        run: uv run pytest tests/ -v --tb=short --cov=fusedb --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── 3. Build + smoke-test sdist ───────────────────────────────────────────────
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build sdist
        run: |
          uv pip install maturin --system
          maturin sdist --out dist/

      - name: Smoke-test sdist install
        run: |
          uv venv test-sdist
          uv pip install --no-build-isolation dist/*.tar.gz
          uv run python -c "import fusedb; print(fusedb.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz